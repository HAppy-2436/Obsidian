      1. **用 python 脚本批量处理**：用 PyMuPDF (fitz) 或 pdfplumber 提取每个 PDF 的全部文本
         ```python
         import fitz, os
         for pdf_path in pdf_files:
             doc = fitz.open(pdf_path)
             text = "\n".join(page.get_text() for page in doc)
             doc.close()
         ```
      2. 对每个 PDF 生成一份 markdown 笔记，结构：
         ```
         # <文件名标题>
         - 来源路径
         - 核心概念：<列出本课件涉及的数据结构/算法>
         - 关键定义：<关键术语>
         - 时间复杂度：<重要算法/操作>
         - 典型例题：<如有>
         - 代码片段：<如有>
