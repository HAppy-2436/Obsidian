tasks:
  - id: labuladong-fetch
    title: "抓取 labuladong 数据结构基础章节"
    prompt: |
      任务：从 https://labuladong.online/zh/algo/intro/data-structure-basic/ 抓取整个"基础：数据结构及排序精讲"章节的完整内容，整理成一份 Markdown。

      工作流程：
      1. 用 webfetch 工具抓取 https://labuladong.online/zh/algo/intro/data-structure-basic/ （markdown 格式）
      2. 从抓取的内容中识别所有子章节链接（递归到所有子页面），逐个抓取
      3. 合并整理成一份 markdown，保留原始的标题层级（##、###）、代码块、列表
      4. 文件开头加一个 ## 目录（TOC），列出所有子章节

      输出文件：workspace/labuladong-data-structure-basic.md
      - 路径绝对路径形如 E:\Obsidian\Obsidian\大一下\数据结构与算法\labuladong-data-structure-basic.md

      要求：
      - 保留所有标题层级
      - 保留所有代码块（```code```）
      - 抓完后报告：抓取了多少子章节、文件大小（KB）
      - 如果某个子页面是付费墙，记录并跳过

      工具：优先用 webfetch，遇到 JS-heavy 页面可以用 matrix_web_search 辅助
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      1. 检查 E:\Obsidian\Obsidian\大一下\数据结构与算法\labuladong-data-structure-basic.md 是否存在
      2. 文件大小 > 10KB
      3. 必须包含以下概念标题（至少各出现一次）：
         - 数组 或 链表
         - 栈 或 队列
         - 递归
         - 二分查找
         - 排序
      4. 至少包含 3 个代码块
      5. 文件开头有"目录"或 TOC 章节
      6. 报告 PASS/FAIL 并列出任何问题
