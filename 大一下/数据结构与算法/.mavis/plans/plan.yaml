  - id: review-guide
    title: "综合生成数据结构与算法复习指南 + 考题预测"
    prompt: |
      任务：基于以下资料，生成一份数据结构与算法的复习指南和考题预测。

      资料来源（请全部读取）：
      1. E:\Obsidian\Obsidian\大一下\数据结构与算法\labuladong-data-structure-basic.md — labuladong 数据结构基础章节（风格参考）
      2. E:\Obsidian\Obsidian\大一下\数据结构与算法\chaoxing-data-structure-course.md — 学习通课程章节内容
      3. E:\Obsidian\Obsidian\大一下\数据结构与算法\课件笔记\当前老师\INDEX.md + 各 .md 笔记 — 当前老师课件核心内容
      4. E:\Obsidian\Obsidian\大一下\数据结构与算法\课件笔记\王丽萍\INDEX.md + INDEX-ADVANCED.md + 各 .md 笔记 — 王丽萍历年课件核心内容

      风格要求（参考 labuladong 风格）：
      - 框架型讲解，不逐行解释细节
      - 每个核心概念给出「是什么 + 关键操作 + 时间复杂度 + 典型场景」
      - 代码示例精简、可运行（C++/Python 均可）
      - Markdown 结构清晰

      内容结构建议：
      ```
      # 数据结构与算法复习指南

      ## 第一部分：基础数据结构
      ### 数组、链表、栈、队列
      ### 递归

      ## 第二部分：基础算法
      ### 二分查找
      ### 排序算法（含复杂度对比表 + 稳定性说明）

      ## 第三部分：树与高级数据结构
      ### 二叉树、BST、AVL、Splay
      ### 堆、Hash、并查集
      ### 多路搜索树（B树、B+树、Trie）

      ## 第四部分：图算法
      ### 图基础概念、表示
      ### 遍历（DFS/BFS）
      ### 最短路（Dijkstra、Floyd）
      ### 拓扑排序

      ## 第五部分：算法设计范式
      ### 贪心、分治
      ### 动态规划（背包、状压 DP、LCS）
      ### 字符串算法（KMP）

      ## 第六部分：考题预测（10-15 题）
      结合两位老师课件重点 + 学习通课程重点：
      - 选择题（概念辨析、时间复杂度）
      - 应用题（给定场景设计算法）
      - 代码题（手写排序、链表反转、二分查找、树遍历）
      - 综合题（图算法、动态规划）

      每题：题目描述、考点、参考难度（易/中/难）、提示思路
      ```

      输出文件：E:\Obsidian\Obsidian\大一下\数据结构与算法\数据结构与算法复习指南.md

      重点：
      - 考题预测要有针对性（不要泛泛"考排序"），结合课件中重复出现的核心算法
      - 不要只搬 labuladong 原内容，要综合所有来源
      - 篇幅 8000-15000 字

      完成后报告：文件大小、覆盖的主题、考题数量
    assigned_to: general
    depends_on: [labuladong-fetch, courseware-current, courseware-wlp-foundations, courseware-wlp-advanced]
    verified_by: verifier
    verify_prompt: |
      1. 检查 E:\Obsidian\Obsidian\大一下\数据结构与算法\数据结构与算法复习指南.md 是否存在
      2. 文件大小 8000-30000 字符（合理范围）
      3. 必须包含以下章节：
         - 数组/链表/栈/队列（基础数据结构）
         - 递归
         - 二分查找
         - 排序算法（含对比表）
         - 树（至少包含 BST、AVL）
         - 图（DFS/BFS）
         - 动态规划
         - 考题预测（≥ 10 题）
      4. 考题预测要具体（有题目描述，不是"考排序"这种空话）
      5. 没有明显事实错误（时间复杂度、算法描述）
      6. 报告 PASS/FAIL 并列出任何遗漏
    max_retries: 2

